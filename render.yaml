services:
  - type: web
    name: banson-media-bot
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: GREEN_API_URL
        sync: false
      - key: GREEN_API_INSTANCE
        sync: false
      - key: GREEN_API_TOKEN
        sync: false
      - key: AUTHORIZED_GROUP_ID
        sync: false
      - key: DRIVE_ROOT_FOLDER_ID
        value: "1XoFd6BeTYrdARJIddRGSiUq5A4BiGOlv"
      - key: GANTT_SHEET_ID
        value: "1ckhUMzTLWehoOPTUCJ8f-dpwHDMrMfiY7Ombu9VY91Y"
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: DB_PATH
        value: "/opt/render/project/src/data/bot.db"
      - key: BUNDLE_WINDOW_SECONDS
        value: "10"
